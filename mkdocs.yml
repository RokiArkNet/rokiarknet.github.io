site_name: RokiArkNet
site_description: ARK Survival Ascended server plugins and mod guides
site_url: https://rokiarknet.github.io

theme:
  name: material
  palette:
    scheme: slate
    primary: deep orange
    accent: orange
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight

nav:
  - Home: index.html
  - Plugins:
    - Overview: plugins/index.html
    - EngramControl: plugins/engramcontrol.html
    - DinoLoot: plugins/dinoloot.html
    - TekUnlock: plugins/tekunlock.html
    - DinoLevelOverride: plugins/dinoleveloverride.html
    - RiderProtection: plugins/riderprotection.html
    - ItemExchange: plugins/itemexchange.html
  - Guides:
    - Primal Nemesis: primal-nemesis.html
    - Primal Chaos: primal-chaos.html
    - Ark Descended: ark-descended.html
    - Ark Supreme: ark-supreme.html
    - Cataclysm 2.0: cataclysm-2.html

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true

docs_dir: content
