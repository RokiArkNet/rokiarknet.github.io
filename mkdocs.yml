site_name: ARK Mod Guides
site_description: ARK Survival Ascended server guides and mod documentation
site_url: https://rokiarknet.github.io

theme:
  name: material
  palette:
    scheme: slate
    primary: deep orange
    accent: orange
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight

nav:
  - Home: index.html
  - Guides:
    - Primal Nemesis: primal-nemesis.html
    - Primal Chaos: primal-chaos.html
    - Ark Descended: ark-descended.html
    - Ark Supreme: ark-supreme.html
    - Cataclysm 2.0: cataclysm-2.html

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true
