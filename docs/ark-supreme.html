function parseMarkdown(md){
  const sections=[];const lines=md.split('\n');let current=null;
  for(const line of lines){
    if(line.startsWith('## ')){if(current)sections.push(current);current={id:line.slice(3).trim(),lines:[]};}
    else if(current){current.lines.push(line);}
  }
  if(current)sections.push(current);
  return sections;
}

function renderSection(section){
  const div=document.createElement('div');div.className='section';div.id=section.id;
  const titleDiv=document.createElement('div');titleDiv.className='section-title';titleDiv.textContent=SECTION_LABELS[section.id]||section.id;div.appendChild(titleDiv);
  const inner=document.createElement('div');
  const blocks=[];let buffer=[];
  const flush=()=>{if(buffer.length){blocks.push({type:'md',content:buffer.join('\n')});buffer=[];}};
  for(const line of section.lines){
    if(line.includes('WARNING:')){flush();blocks.push({type:'warn',content:line.replace(/^> ⚠️ WARNING:?\s*/,'').replace(/^> WARNING:?\s*/,'')});}
    else if(line.startsWith('> STRUCTURE DAMAGE:')){flush();blocks.push({type:'struct',content:line.replace(/^> STRUCTURE DAMAGE:\s*/,'')});}
    else if(line.startsWith('> ')){flush();blocks.push({type:'tip',content:line.slice(2)});}
    else{buffer.push(line);}
  }
  flush();
  blocks.forEach(block=>{
    if(block.type==='warn'){const el=document.createElement('div');el.className='warn';el.textContent=block.content;inner.appendChild(el);}
    else if(block.type==='tip'){const el=document.createElement('div');el.className='tip';el.textContent=block.content;inner.appendChild(el);}
    else if(block.type==='struct'){const el=document.createElement('div');el.className='struct-badge';el.textContent='Structure Damage — '+block.content;inner.appendChild(el);}
    else{const el=document.createElement('div');el.innerHTML=marked.parse(block.content);
      el.querySelectorAll('h3').forEach(h=>h.style.cssText='font-size:16px;font-weight:700;color:#f0a020;margin:24px 0 10px;text-transform:uppercase;letter-spacing:1px;');
      el.querySelectorAll('h4').forEach(h=>h.style.cssText='font-size:14px;font-weight:700;color:#d8d8e8;margin:16px 0 6px;');
      el.querySelectorAll('p').forEach(p=>p.style.cssText='margin-bottom:12px;color:#d8d8e8;');
      el.querySelectorAll('ul,ol').forEach(l=>l.style.cssText='padding-left:20px;margin-bottom:12px;');
      el.querySelectorAll('li').forEach(l=>l.style.cssText='margin-bottom:4px;color:#d8d8e8;');
      el.querySelectorAll('strong').forEach(s=>s.style.color='#f0a020');
      inner.appendChild(el);}
  });
  div.appendChild(inner);return div;
}

async function loadGuide(){
  try{
    const resp=await fetch(CONTENT_URL+'?t='+Date.now());
    const md=await resp.text();
    const sections=parseMarkdown(md);
    const contentEl=document.getElementById('content');
    const hero=document.createElement('div');hero.id='hero';
    hero.innerHTML='<h1>ARK SUPREME</h1>';
    const baseline=sections.find(s=>s.id==='baseline');
    if(baseline){const box=document.createElement('div');box.className='baseline-box';box.innerHTML=marked.parse(baseline.lines.join('\n'));hero.appendChild(box);}
    contentEl.appendChild(hero);
    sections.filter(s=>s.id!=='baseline').forEach(section=>{
      if(section.id==='tier-list'){
        const td=document.createElement('div');td.className='section';td.id='tier-list';
        const tt=document.createElement('div');tt.className='section-title';tt.textContent='Tier List';
        td.appendChild(tt);
        td.appendChild(renderTierDiagram());
        contentEl.appendChild(td);return;
      }
      contentEl.appendChild(renderSection(section));
    });
    const footer=document.createElement('div');footer.className='guide-footer';
    footer.innerHTML='Guide maintained by Rokitur — RokiArkNet<br>Questions or corrections? Contact @Rokitur on Discord';
    contentEl.appendChild(footer);
    document.getElementById('loading').style.display='none';
    contentEl.style.display='block';
    buildNav();
    const navLinks=document.querySelectorAll('#nav a');
    window.addEventListener('scroll',()=>{
      let current='';
      document.querySelectorAll('.section[id]').forEach(s=>{if(window.scrollY>=s.offsetTop-100)current=s.id;});
      navLinks.forEach(a=>{a.classList.toggle('active',a.getAttribute('href')==='#'+current);});
    });
  }catch(e){document.getElementById('loading').textContent='Failed to load guide. '+e.message;}
}
loadGuide();
</script>
