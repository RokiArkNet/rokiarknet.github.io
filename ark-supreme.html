<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ark Supreme Guide</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700;900&display=swap');
:root{--bg:#0d0d12;--surface:#14141e;--card:#1a1a28;--border:#2a2a3e;--orange:#e8580a;--amber:#f0a020;--text:#d8d8e8;--muted:#7878a0;--tip:#0f2a1a;--tip-border:#1a6a30;--warn:#2a1a08;--warn-border:#8a4010;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:16px;line-height:1.7;display:flex;}
#sidebar{position:fixed;top:0;left:0;width:240px;height:100vh;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;z-index:100;padding-bottom:40px;}
#sidebar-header{padding:20px 16px 14px;border-bottom:1px solid var(--border);}
.logo{font-family:'Orbitron',monospace;font-size:11px;color:var(--orange);letter-spacing:3px;}
#sidebar-header h2{font-size:14px;font-weight:700;color:var(--text);margin-top:4px;}
.home-link{display:block;font-size:11px;color:var(--muted);text-decoration:none;margin-bottom:8px;transition:color .15s;}
.home-link:hover{color:var(--orange);}
#sidebar nav a{display:block;padding:8px 16px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:600;border-left:2px solid transparent;transition:all .15s;}
#sidebar nav a:hover,#sidebar nav a.active{color:var(--orange);border-left-color:var(--orange);background:rgba(232,88,10,.06);}
.nav-section{padding:12px 16px 4px;font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;opacity:.6;}
#main{margin-left:240px;flex:1;max-width:860px;padding:48px 48px 120px;}
#loading{text-align:center;padding:80px;font-family:'Orbitron',monospace;color:var(--orange);letter-spacing:3px;}
#hero{text-align:center;padding:40px 0 48px;border-bottom:1px solid var(--border);margin-bottom:56px;}
.eyebrow{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:4px;color:var(--orange);text-transform:uppercase;margin-bottom:12px;}
#hero h1{font-family:'Orbitron',monospace;font-size:36px;font-weight:900;color:#fff;text-shadow:0 0 40px rgba(232,88,10,.3);letter-spacing:2px;}
.baseline-box{margin-top:20px;background:var(--card);border:1px solid var(--border);border-left:3px solid var(--amber);padding:12px 16px;font-size:13px;color:var(--muted);display:inline-block;text-align:left;}
.section{margin-bottom:56px;}
.section-title{font-family:'Orbitron',monospace;font-size:13px;letter-spacing:3px;color:var(--orange);text-transform:uppercase;margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.section h3{font-size:16px;font-weight:700;color:var(--amber);margin:24px 0 10px;text-transform:uppercase;letter-spacing:1px;}
.section h4{font-size:14px;font-weight:700;color:var(--text);margin:16px 0 6px;}
.section p{margin-bottom:12px;color:var(--text);}
.section ul,.section ol{padding-left:20px;margin-bottom:12px;}
.section li{margin-bottom:4px;color:var(--text);}
.section strong{color:var(--amber);}
.tip{background:var(--tip);border-left:3px solid var(--tip-border);padding:10px 14px;font-size:14px;color:#90d8a0;margin:14px 0;}
.tip::before{content:'TIP  ';font-weight:700;letter-spacing:2px;}
.warn{background:var(--warn);border-left:3px solid var(--warn-border);padding:10px 14px;font-size:14px;color:#d8a060;margin:14px 0;}
.warn::before{content:'WARNING  ';font-weight:700;letter-spacing:2px;color:var(--orange);}
.struct-badge{display:inline-block;background:rgba(232,88,10,.12);border:1px solid rgba(232,88,10,.25);padding:3px 10px;font-size:12px;color:var(--orange);margin-bottom:14px;letter-spacing:1px;}
.guide-footer{margin-top:80px;padding-top:24px;border-top:1px solid var(--border);font-size:13px;color:var(--muted);}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);}
@media(max-width:768px){#sidebar{display:none;}#main{margin-left:0;padding:60px 20px 80px;}.mobile-back{display:block;}}
.mobile-back{display:none;position:fixed;top:0;left:0;right:0;background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;z-index:100;}
.mobile-back a{color:var(--orange);text-decoration:none;font-size:14px;font-weight:600;}
.tier-block{background:var(--card);border:1px solid var(--border);padding:8px 16px;margin:4px 0;font-size:13px;font-weight:600;color:var(--text);border-radius:3px;display:flex;align-items:center;gap:12px;}
.tier-num{font-family:'Orbitron',monospace;font-size:11px;color:var(--orange);min-width:24px;}
.tier-name{color:var(--amber);}
.tier-split{color:var(--muted);font-size:12px;}
.creature-legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:24px;font-size:12px;color:var(--muted);align-items:center;}
.creature-legend-item{display:flex;align-items:center;gap:6px;}
.creature-tier{margin-bottom:36px;}
.creature-tier-title{font-size:11px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:2px;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.creature-sub-title{font-size:10px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:2px;margin:14px 0 8px;}
.creature-grid{display:flex;flex-wrap:wrap;gap:5px;}
.creature{background:var(--card);border:1px solid var(--border);padding:4px 10px;font-size:11px;font-weight:600;color:var(--text);border-radius:3px;}
.creature.boss{background:#1a0f0a;border:1px solid #e8580a;color:#F0997B;font-weight:700;}
.creature.savage{border-color:#dc2626;color:#fca5a5;}
.creature.toxic{border-color:#22c55e;color:#86efac;}
.creature.berserk{border-color:#f97316;color:#fdba74;}
.creature.necrotic{border-color:#a855f7;color:#d8b4fe;}
.creature.grenadier{border-color:#e8580a;color:#f0a020;}
.creature.prime{border-color:#eab308;color:#fde047;}
.creature.nuclear{border-color:#facc15;color:#fef08a;}
.creature.vampiric{border-color:#dc2626;color:#fca5a5;}
.creature.warden{border-color:#06b6d4;color:#67e8f9;}
.creature.hellfire{border-color:#ef4444;color:#fca5a5;}
.creature.darkgod{border-color:#7c3aed;color:#c4b5fd;}
.creature.corrupted{border-color:#e8580a;color:#f0a020;}
.creature.spectral{border-color:#06b6d4;color:#22d3ee;}
.creature.elite{border-color:#9ca3af;color:#d1d5db;}
.boss-block{background:rgba(232,88,10,.06);border:1px solid rgba(232,88,10,.2);padding:12px;margin:12px 0;border-radius:4px;}
.boss-block-label{font-size:10px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;}
#modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center;padding:20px;}
#modal-overlay.show{display:flex;}
#modal{background:var(--surface);border:1px solid var(--border);padding:24px;max-width:700px;width:100%;max-height:90vh;overflow-y:auto;border-radius:4px;}
#modal-title{font-family:'Orbitron',monospace;font-size:18px;font-weight:700;color:#fff;margin-bottom:4px;}
#modal-tier{font-size:12px;color:var(--muted);margin-bottom:20px;letter-spacing:1px;}
.modal-field{margin-bottom:16px;}
.modal-field-label{font-size:11px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.modal-field-value{background:var(--bg);border:1px solid var(--border);padding:10px 12px;font-family:monospace;font-size:11px;color:var(--text);word-break:break-all;border-radius:3px;user-select:all;cursor:text;}
.modal-field-value:empty{display:none;}
.modal-field-value:empty+.modal-field-label{display:none;}
#modal-close{padding:10px 20px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;transition:all .15s;border-radius:3px;margin-top:10px;}
#modal-close:hover{border-color:var(--orange);color:var(--orange);}
.creature.clickable{cursor:pointer!important;transition:all .15s;opacity:1;filter:brightness(1.3);}
.creature.clickable:hover{border-color:var(--orange);background:rgba(232,88,10,.1);}
.creature.no-data{opacity:.6;cursor:default;}
</style>
</head>

    <button id="modal-close">Close</button>
  </div>
</div>

  "Mesopithecus":"Monkey","Defense Unit":"defenseunit","Sabertooth":"Saber",
  "Karkinos":"Crab","Rock Elemental":"Golem","Broodmother":"Spider","Triceratops":"Trike",
  "Rock Elemental BOSS":"Golem BOSS","Broodmother BOSS":"Spider BOSS",
  "Necrotic Bee":"Necrotic Queen Bee","Prime Bee":"Prime Queen Bee",
  "Nuclear/Vampiric Bee":"Nuclear Queen Bee","Hellfire Bee":"Hellfire Queen Bee",
  "DarkGod Bee":"Darkgod Queen Bee"
};

function lookupCreature(tierPrefix, creatureName) {
  const mapped = NAME_MAP[creatureName] || creatureName;
  const keys = [
    tierPrefix + " " + mapped,
    tierPrefix + " " + creatureName,
    tierPrefix + mapped,
    tierPrefix + creatureName,
    mapped,
    creatureName
  ];
  for (const key of keys) {
    if (CREATURE_DATA[key]) return CREATURE_DATA[key];
  }
  // Try fuzzy match
  const lowerName = mapped.toLowerCase();
  for (const [k, v] of Object.entries(CREATURE_DATA)) {
    if (k.toLowerCase().includes(lowerName)) return v;
  }
  return null;
}

function showModal(tierPrefix, creatureName) {
  const data = lookupCreature(tierPrefix, creatureName);
  if (!data) return;
  document.getElementById('modal-title').textContent = creatureName;
  document.getElementById('modal-tier').textContent = tierPrefix;
  document.getElementById('f-blueprint').textContent = data.blueprint || '';
  document.getElementById('f-summon-wild').textContent = data.summonWild || '';
  document.getElementById('f-summon-tamed').textContent = data.summonTamed || '';
  document.getElementById('f-blueprint-path').textContent = data.blueprintPath || '';
  document.getElementById('f-spawndino').textContent = data.spawnDino || '';
  document.getElementById('f-disable').textContent = data.disable || '';
  document.querySelectorAll('.modal-field').forEach(f => {
    const val = f.querySelector('.modal-field-value');
    f.style.display = val && val.textContent ? 'block' : 'none';
  });
  document.getElementById('modal-overlay').classList.add('show');
}

function hideModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}

function clearModalFields() {
  ['f-blueprint','f-summon-wild','f-summon-tamed','f-blueprint-path','f-spawndino','f-disable','f-class','f-spawn'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = '';
  });
  const w = document.getElementById('f-disable-warning');
  if (w) w.style.display = 'none';
}

function showItemModal(itemName) {
  const data = ITEM_DATA[itemName];
  if (!data) return false;
  clearModalFields();
  document.getElementById('modal-title').textContent = data.engramName || itemName;
  document.getElementById('modal-tier').textContent = data.subcategory || data.category || '';
  document.getElementById('f-class').textContent = data.class || '';
  document.getElementById('f-spawn').textContent = data.spawn || '';
  document.getElementById('f-blueprint-path').textContent = data.blueprintPath || '';
  document.getElementById('f-disable').textContent = data.disable || '';
  document.getElementById('f-disable-warning').style.display = data.disable ? 'block' : 'none';
  document.querySelectorAll('.modal-field').forEach(f => {
    const val = f.querySelector('.modal-field-value');
    f.style.display = val && val.textContent ? 'block' : 'none';
  });
  document.getElementById('modal-overlay').classList.add('show');
  return true;
}

function renderItemReference() {
  const wrap = document.createElement('div');
  const grouped = {};
  Object.entries(ITEM_DATA).forEach(([name, data]) => {
    const cat = data.category || 'Uncategorized';
    const sub = data.subcategory || '';
    if (!grouped[cat]) grouped[cat] = {};
    if (!grouped[cat][sub]) grouped[cat][sub] = [];
    grouped[cat][sub].push(name);
  });
  Object.entries(grouped).forEach(([cat, subs]) => {
    const catDiv = document.createElement('div');
    catDiv.className = 'creature-tier';
    const catTitle = document.createElement('div');
    catTitle.className = 'creature-tier-title';
    catTitle.textContent = cat;
    catDiv.appendChild(catTitle);
    const orderedSubs = Object.keys(subs).sort((a, b) => {
      const ai = ITEM_SUBCATEGORY_ORDER.indexOf(a);
      const bi = ITEM_SUBCATEGORY_ORDER.indexOf(b);
      return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
    });
    orderedSubs.forEach(sub => {
      if (sub) {
        const subTitle = document.createElement('div');
        subTitle.className = 'creature-sub-title';
        subTitle.textContent = sub;
        catDiv.appendChild(subTitle);
      }
      const grid = document.createElement('div');
      grid.className = 'creature-grid';
      subs[sub].sort().forEach(name => {
        const tile = document.createElement('div');
        tile.className = 'creature clickable';
        tile.textContent = name;
        tile.title = 'Click for spawn data';
        tile.addEventListener('click', () => showItemModal(name));
        grid.appendChild(tile);
      });
      catDiv.appendChild(grid);
    });
    wrap.appendChild(catDiv);
  });
  return wrap;
}

function parseMarkdown(md){
  const sections=[];const lines=md.split('\n');let current=null;
  for(const line of lines){
    if(line.startsWith('## ')){if(current)sections.push(current);current={id:line.slice(3).trim(),lines:[]};}
    else if(current){current.lines.push(line);}
  }
  if(current)sections.push(current);
  return sections;
}

function renderSection(section){
  const div=document.createElement('div');div.className='section';div.id=section.id;
  const titleDiv=document.createElement('div');titleDiv.className='section-title';titleDiv.textContent=SECTION_LABELS[section.id]||section.id;div.appendChild(titleDiv);
  const inner=document.createElement('div');
  const blocks=[];let buffer=[];
  const flush=()=>{if(buffer.length){blocks.push({type:'md',content:buffer.join('\n')});buffer=[];}};
  for(const line of section.lines){
    if(line.includes('WARNING:')){flush();blocks.push({type:'warn',content:line.replace(/^> ⚠️ WARNING:?\s*/,'').replace(/^> WARNING:?\s*/,'')});}
    else if(line.startsWith('> STRUCTURE DAMAGE:')){flush();blocks.push({type:'struct',content:line.replace(/^> STRUCTURE DAMAGE:\s*/,'')});}
    else if(line.startsWith('> ')){flush();blocks.push({type:'tip',content:line.slice(2)});}
    else{buffer.push(line);}
  }
  flush();
  blocks.forEach(block=>{
    if(block.type==='warn'){const el=document.createElement('div');el.className='warn';el.textContent=block.content;inner.appendChild(el);}
    else if(block.type==='tip'){const el=document.createElement('div');el.className='tip';el.textContent=block.content;inner.appendChild(el);}
    else if(block.type==='struct'){const el=document.createElement('div');el.className='struct-badge';el.textContent='Structure Damage — '+block.content;inner.appendChild(el);}
    else{const el=document.createElement('div');el.innerHTML=marked.parse(block.content);
      el.querySelectorAll('h3').forEach(h=>h.style.cssText='font-size:16px;font-weight:700;color:#f0a020;margin:24px 0 10px;text-transform:uppercase;letter-spacing:1px;');
      el.querySelectorAll('h4').forEach(h=>h.style.cssText='font-size:14px;font-weight:700;color:#d8d8e8;margin:16px 0 6px;');
      el.querySelectorAll('p').forEach(p=>p.style.cssText='margin-bottom:12px;color:#d8d8e8;');
      el.querySelectorAll('ul,ol').forEach(l=>l.style.cssText='padding-left:20px;margin-bottom:12px;');
      el.querySelectorAll('li').forEach(l=>l.style.cssText='margin-bottom:4px;color:#d8d8e8;');
      el.querySelectorAll('strong').forEach(s=>s.style.color='#f0a020');
      inner.appendChild(el);}
  });
  div.appendChild(inner);return div;
}

    // LOCAL DEV: Embedded content instead of fetch
    const md="# Ark Supreme \u2014 Guide Content\n\n## baseline\n\nAll stats based on Level 150 unboosted creatures \u2014 no server multipliers or custom imprints. Assumes working knowledge of basic ARK mechanics.\n\n## tier-list\n\nElite | Savage | Toxic | Berserk | Necrotic | Grenadier | Prime | Nuclear | Vampiric | Wardens | Hellfire | DarkGod | Corrupted Darkgods | Spectral Wardens\n\n## getting-started\n\nYou spawn with a 40-second shield \u2014 use it to get your bearings and find cover.\n\nSurvive long enough to establish a safe location \u2014 whether it's a raft base or a small land outpost tucked away from danger.\n\n### Core Crafting Structures\n\n**Supreme Forge** \u2014 Smelts metal and alloys.\n\n**Supreme Bench** \u2014 Primary station for modded gear, kibble, boss item crafting, potions, and consumables.\n\n**Supreme Bed** \u2014 Respawn point.\n\n### The Progression Loop\n\nThe first three tiers \u2014 Savage, Toxic, and Berserk \u2014 follow the same progression loop:\n\n1. **Hunt and harvest** \u2014 Kill wild creatures of your target tier and harvest their blood\n2. **Craft tranqs** \u2014 Use the blood to craft tier-appropriate tranquilizers\n3. **Tame** \u2014 Knock out and tame creatures of that tier\n4. **Establish egg farms** \u2014 Breed your tames to produce eggs for the next tier's kibble\n5. **Repeat** \u2014 Move to the next tier and start again\n\n## cores-essence\n\nEvery wild creature drops a tier-appropriate **Dino Core** when killed. **1 Dino Core = 10 Essence.**\n\n- **Cores** are used to craft boss summons.\n- **Essence** is an additional ingredient required by all kibble recipes (on top of the eggs the loop already covers).\n\n## elite\n\nYour true entry point. Elite creatures have minor stat boosts above vanilla, making them helpful early-game tames while you prepare to take on Savage tier.\n\n## savage\n\nYour first tiered progression. Hunt Savage creatures for Savage Blood, craft Savage Tranqs, and tame your first Savage dinos. Set up breeding pairs to produce Savage Eggs for Toxic Kibble.\n\n## savage-boss\n\nThe Savage Boss is your first boss gate. When defeated, it spawns a tameable version that can be tamed with kibble.\n\n### Savage Snail\n\nThe tameable Savage Boss produces **Savage Slime Balls**, which are required for crafting all kibble from Toxic tier onward. Taming this boss is essential for progression.\n\n- Feed berries to produce slime balls\n- Can be evolved into a smaller version for easier base storage\n- If slime production stops, pod and re-deploy the snail\n\n## toxic\n\nWith Toxic Kibble ready, repeat the loop. Harvest Toxic Blood, craft Toxic Tranqs, tame Toxic creatures, and breed them for Berserk Kibble.\n\nToxic creatures have an AOE ability that inflicts torpor \u2014 a powerful alternative to tranqs for knocking out targets.\n\n> During this progression, start growing crops \u2014 you'll need them for Berserk Kibble.\n\n## berserk\n\nSame pattern, higher stakes. Berserk creatures hit harder and take more to bring down, but the rewards scale accordingly.\n\n### Berserk Kings\n\nThree Berserk King bosstiers guard entry to Necrotic tier:\n\n- **King of the Swamps** \u2014 swamp biomes (sarco variant)\n- **King of the Grasslands** \u2014 grassland/plains areas (giga variant)\n- **King of the Desert** \u2014 desert areas (deathworm variant)\n\nYou must collect a soul from ALL THREE kings to evolve your Savage Snail into a **Berserk Snail**, which produces Berserk Slime Balls for all kibble from Necrotic tier onward.\n\n> Tame a second Savage Snail before evolving. Kibbles from Necrotic tier onward require BOTH Savage and Berserk slime balls, so you need one of each snail running in parallel. Evolving your only snail leaves you unable to produce Savage slimes.\n\n**Server INIs** (`[ArkSupreme]` section) \u2014 cap the number of each King alive in the world at once:\n\n```\nMaxKingOfTheDesert=3\nMaxKingOfTheGrass=3\nMaxKingOfTheSwamp=3\n```\n\n## necrotic\n\nNecrotic is where things change. Two new systems unlock here: **Paragon Levels** for cultivating tamed dinos (see [FAQ](#faq)) and **Queen Bee** honey production for higher-tier crafting.\n\n### Honey Production\n\nWild bees are hostile and attack on sight. To set up honey production:\n\n1. **Kill wild bees** to collect a small amount of honey\n2. **Craft Bee Kibble** from that honey at the Supreme Bench\n3. **Tame a Queen Bee** with the kibble for sustained honey production\n\nOnce tamed, place the tier's rare flowers (crafted at the Supreme Bench) in the bee's inventory \u2014 the bee produces honey automatically.\n\nQueen Bees are available across Necrotic, Prime, Nuclear, Vampiric, Hellfire, and DarkGod tiers \u2014 each tier's bee uses that tier's rare flowers.\n\n## necrotic-boss\n\nThe Necrotic Boss is a **Golem BOSS** that serves as the gate to Grenadier tier.\n\n- **Tameable**: Yes - uses kibble for taming\n- **Rewards**: Defeating the boss unlocks Grenadier kibble engrams\n\n## grenadier\n\nGrenadier tier introduces explosive combat mechanics.\n\n### Grenadier Tokens & Factory\n\nWild **Grenadier Bosses** drop a **Grenadier Token** and a **Grenadier Factory**. To produce **Grenadier Herb** (the key ingredient for Prime Kibble), the factory needs both the Grenadier Token *and* a **Chief Grenadier Token** dropped by the Grenadier Boss Tribesman.\n\n### Grenadier Boss Tribesman\n\nA hostile tribe that can **only be fought with Grenadier-tier or higher tamed dinos**. The chief drops the Chief Grenadier Token required for Grenadier Herb production.\n\n## prime\n\nPrime tier features Guardian bosses that serve as the gate to Nuclear and Vampiric tiers.\n\n### Taming Prime Creatures\n\nTo tame Prime tier creatures, you need Prime Kibble made from Grenadier Herb:\n\n1. **Collect Grenadier Herb** \u2014 Produced by the Grenadier Factory (see Grenadier section)\n2. **Craft kibble** \u2014 Use Grenadier Herb at the Supreme Bench to craft **Prime Kibble**\n3. **Tame** \u2014 Knock out Prime creatures with appropriate tranqs and feed Prime Kibble\n\n### Prime Guardians\n\nThree Guardian bosses exist: Broodmother, Ferox, and Spino. Defeating all three Prime Guardians unlocks Nuclear and Vampiric kibble engrams.\n\n> Prime-tier bosses take reduced damage from anything that isn't a tek-type dino \u2014 bring Primes (or higher tek tiers) to fight Primes.\n\n## nuclear-vampiric\n\nDefeating all three Prime Guardians unlocks Nuclear and Vampiric kibble engrams.\n\n## wardens\n\nWardens tier introduces wild-only boss spawning.\n\n### Wild Boss Spawning\n\nKilling a wild Warden boss spawns a tameable version on the spot \u2014 knock it out and tame it with the appropriate kibble.\n\n### Spectral Evolution\n\nWardens are evolved into Spectral Wardens \u2014 see the Spectral Wardens section for evolution requirements.\n\n## hellfire\n\nHellfire creatures use portal-based attacks.\n\nDefeating the Hellfire Boss unlocks DarkGod kibble.\n\n## darkgod\n\nDarkGods are obtained by evolving creatures using a token dropped by the DarkGod King.\n\n### DarkGod Lineup\n\nAvailable DarkGod variants: Rex, Spider (Broodmother), Crab, Golem, **Griffin**, and **Reaper**.\n\n### DarkGod King\n\nThe **DarkGod King** drops the DarkGod token \u2014 the key item for evolving DarkGod creatures. The token has a wide pickup radius, so you don't need to land directly on the corpse.\n\n### DarkGod Drops\n\nDefeating wild DarkGods rewards:\n- Large XP potions\n- Random assortment of Health potions\n- Random assortment of Tranqs\n- Random assortment of DarkGod-tier Saddles\n\n## corrupted-darkgods\n\nCorrupted DarkGods are the best creatures to use against Spectral Wardens.\n\n### Obtaining Corrupted DarkGods\n\nThe Corrupted DarkGod Rex, Broodmother, Golem, **Griffin**, and **Reaper** are obtained **only by evolving their DarkGod counterparts** \u2014 they do not spawn in the wild and cannot be tamed directly.\n\n### Corrupted DarkGod King\n\nDefeating the **Corrupted DarkGod King** drops the token used to evolve Wardens into Spectral Wardens.\n\n## spectral-wardens\n\nSpectral Wardens are the final evolution of Wardens.\n\n### Evolution Requirement\n\nEvolving a Warden into a Spectral Warden requires a **Corrupted DarkGod King token**, dropped by the Corrupted DarkGod King (see Corrupted DarkGods).\n\n### Spectral Warden Drops\n\nDefeating wild Spectral Wardens rewards:\n- Large XP potions\n- Random assortment of Health potions\n- Random assortment of Tranqs\n- Random assortment of Spectral Warden Saddles\n\n## juggernaut\n\nThe Juggernaut is the **final boss** of progression \u2014 fought after Spectral Wardens.\n\n### Boss Fight\n\nThe Juggernaut now matches Spectral Wardens in strength and is a significant challenge. Defeating it drops a **Tameable Juggernaut Saddle**.\n\n### Tameable Juggernaut\n\nAfter the Juggernaut boss is defeated, a **Tameable Juggernaut** spawns. Tame it with **Juggernaut Kibble**.\n\n## faq\n\n### Boss Combat\n\nAll ground-based bosses will dismount flyers (10 second cooldown) \u2014 bring a ground mount for boss fights. Flyer-type bosses (Wyverns, Manticores) are the exception and do not dismount you.\n\n### Tool Harvest Rates\n\n| Tier | Harvest |\n|------|---------|\n| Savage | 1.5x |\n| Toxic | 2x |\n| Berserk | 2.5x |\n| Necrotic | 3x |\n| Prime | 3.5x |\n| Hellfire | 4x |\n\n*Hellfire tools have custom materials.*\n\n### Armor Ratings\n\n| Tier | Rating |\n|------|--------|\n| Savage | 60 |\n| Toxic | 100 |\n| Berserk | 200 |\n| Necrotic | 300 |\n| Prime | 400 |\n| Hellfire | 600 |\n\n*Per piece. All tiered armor has infinite durability.*\n\n### Tribesman & Lootbosses\n\nHostile NPCs that spawn in the wild and drop valuable loot when killed. Each Tribesman tier drops items scaled to its own tier.\n\n**Tribesman tiers** (Minion and Chief variants where applicable):\n- Savage, Toxic, Berserk, Necrotic, Grenadier, Prime\n\n**Boss Tribesman**:\n- **Grenadier Boss Tribesman** \u2014 drops the **Chief Grenadier Token** required by the Grenadier Factory to produce Grenadier Herb. Can only be fought with Grenadier-tier or higher tamed dinos.\n\n**Mounted Variants** \u2014 at higher tiers, some Tribesman ride mounted dinos into combat.\n\n**General Drops** \u2014 each Tribesman drops a tier-appropriate mix of:\n- XP potions (size scales with tier \u2014 Tiny \u2192 Medium \u2192 High \u2192 Extra Large)\n- Health potions (random assortment, tier-specific)\n- Tranqs of their tier and below\n- Saddles, Armour, and Tools at their tier\n- High-quality weapons from Berserk tier upward (fabricated snipers, longnecks, etc.)\n- Ammo and ammo materials (Grenadier Boss Tribesman)\n- Taming Cakes (x50, x100, x250) \u2014 instantly remove food during taming\n\n**Notable extras**:\n- Necrotic Tribesman also drop tameable Necrotic boss saddles\n- Prime Tribesman are extremely dangerous \u2014 come prepared\n\n### Tribesman Aggression\n\nAll Tribesman are now instantly aggressive on sight \u2014 no provocation required. When you attack one tribe, nearby Tribesman from neighboring tribes will join in to defend each other. Plan engagements with flanking in mind.\n\n### Paragon Levels\n\nFrom Necrotic tier upward, your tamed creatures can be **cultivated through 10 Paragon Levels** \u2014 a separate progression layered on top of normal taming. Higher levels boost stats and unlock new abilities.\n\n**Level Progression** \u2014 Level up by killing wild creatures with your dino. A dedicated UI shows your current Paragon level and progress to the next.\n\n| Level | Reward |\n|-------|--------|\n| 1\u20134 | Stat boosts each level |\n| 5 | Stat boost + unlocks the **Powerup Ability** (requires defeating a Paragon Boss with that dino) |\n| 6\u20139 | Stat boosts each level |\n| 10 | Unlocks the dino's **Supreme version** \u2014 major stat upgrade |\n\n**Powerup Ability** \u2014 Dinos from Necrotic tier and up are **powered down** at tame time. After completing Paragon level 5 *and* defeating a Paragon Boss with that creature, a button combination unlocks that toggles it between powered-up and powered-down states. Powered-up applies both a visual change and a stat boost.\n\n**Paragon Bosses** \u2014 80 Paragon Bosses can be summoned across the higher tiers. Each summon spawns a random higher-tiered creature with its powerup active \u2014 these are the gates required to unlock your dino's powerup at level 5.\n\nPowerups are available on every tier from Necrotic upward: Necrotic, Grenadier, Prime, Nuclear, Vampiric, Wardens, Hellfire, DarkGod, Corrupted DarkGod, and Spectral Wardens.\n\n### Hostile System\n\nKilling Tribesman triggers a **hostile counter** (icon appears in bottom right). As your hostility increases (x2, x4, etc.), more Tribesman will actively hunt you down and their weapons progressively upgrade from spears to longnecks. On servers, hostility persists until cleared. In singleplayer, it times out after 10 seconds.\n";
