function buildNav(){
  const nav=document.getElementById('nav');
  for(const[group,items]of Object.entries(NAV_SECTIONS)){
    const div=document.createElement('div');div.className='nav-section';div.textContent=group;nav.appendChild(div);
    items.forEach(item=>{
      if(Array.isArray(item)){
        item.forEach(subId=>{const a=document.createElement('a');a.href='#'+subId;a.textContent=SECTION_LABELS[subId]||subId;a.className='nav-sub';nav.appendChild(a);});
      }else{
        const a=document.createElement('a');a.href='#'+item;a.textContent=SECTION_LABELS[item]||item;nav.appendChild(a);
      }
    });
  }
}

function downloadTierDiagramAsPng(wrap){
  const svg=wrap.querySelector('svg');
  if(!svg)return;
  const svgStr=new XMLSerializer().serializeToString(svg);
  const vb=svg.viewBox.baseVal;
  const scale=2;
  const w=vb.width*scale,h=vb.height*scale;
  const blob=new Blob([svgStr],{type:'image/svg+xml;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const img=new Image();
  img.onload=()=>{
    const canvas=document.createElement('canvas');
    canvas.width=w;canvas.height=h;
    const ctx=canvas.getContext('2d');
    ctx.fillStyle='#14141e';
    ctx.fillRect(0,0,w,h);
    ctx.drawImage(img,0,0,w,h);
    URL.revokeObjectURL(url);
    canvas.toBlob(b=>{
      const a=document.createElement('a');
      a.href=URL.createObjectURL(b);
      a.download='nemesis-supreme-tier-list.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(a.href),1000);
    },'image/png');
  };
  img.onerror=()=>{URL.revokeObjectURL(url);alert('Failed to render diagram. Check console.');};
  img.src=url;
}

function parseMarkdown(md){
  const sections=[];const lines=md.split('\n');let current=null;
  for(const line of lines){
    if(line.startsWith('## ')){if(current)sections.push(current);current={id:line.slice(3).trim(),lines:[]};}
    else if(current){current.lines.push(line);}
  }
  if(current)sections.push(current);
  return sections;
}

function renderSection(section){
  const div=document.createElement('div');div.className='section';div.id=section.id;
  const titleDiv=document.createElement('div');titleDiv.className='section-title';titleDiv.textContent=SECTION_LABELS[section.id]||section.id;div.appendChild(titleDiv);
  const inner=document.createElement('div');
  const blocks=[];let buffer=[];
  const flush=()=>{if(buffer.length){blocks.push({type:'md',content:buffer.join('\n')});buffer=[];}};
  for(const line of section.lines){
    if(line.includes('WARNING:')){flush();blocks.push({type:'warn',content:line.replace(/^> ⚠️ WARNING:?\s*/,'').replace(/^> WARNING:?\s*/,'')});}
    else if(line.startsWith('> STRUCTURE DAMAGE:')){flush();blocks.push({type:'struct',content:line.replace(/^> STRUCTURE DAMAGE:\s*/,'')});}
    else if(line.startsWith('> ')){flush();blocks.push({type:'tip',content:line.slice(2)});}
    else{buffer.push(line);}
  }
  flush();
  blocks.forEach(block=>{
    if(block.type==='warn'){const el=document.createElement('div');el.className='warn';el.textContent=block.content;inner.appendChild(el);}
    else if(block.type==='tip'){const el=document.createElement('div');el.className='tip';el.textContent=block.content;inner.appendChild(el);}
    else if(block.type==='struct'){const el=document.createElement('div');el.className='struct-badge';el.textContent='Structure Damage — '+block.content;inner.appendChild(el);}
    else{const el=document.createElement('div');el.innerHTML=marked.parse(block.content);
      el.querySelectorAll('h3').forEach(h=>h.style.cssText='font-size:16px;font-weight:700;color:#f0a020;margin:24px 0 10px;text-transform:uppercase;letter-spacing:1px;');
      el.querySelectorAll('h4').forEach(h=>h.style.cssText='font-size:14px;font-weight:700;color:#d8d8e8;margin:16px 0 6px;');
      el.querySelectorAll('p').forEach(p=>p.style.cssText='margin-bottom:12px;color:#d8d8e8;');
      el.querySelectorAll('ul,ol').forEach(l=>l.style.cssText='padding-left:20px;margin-bottom:12px;');
      el.querySelectorAll('li').forEach(l=>l.style.cssText='margin-bottom:4px;color:#d8d8e8;');
      el.querySelectorAll('strong').forEach(s=>s.style.color='#f0a020');
      inner.appendChild(el);}
  });
  div.appendChild(inner);return div;
}

async function loadGuide(){
  try{
    // LOCAL DEV: Embedded content instead of fetch
    const md="# Nemesis Supreme \u2014 Guide Content\n\n## baseline\n\nAll stats based on Level 150 unboosted creatures \u2014 no server multipliers or custom imprints. Assumes working knowledge of basic ARK mechanics.\n\nThis server is a hybrid framework: ArkSupreme is the base, with Primal Nemesis and Primal Chaos bosses woven into the progression as kill-gates. Major boss kills drop lore notes pointing you to the next gate \u2014 read what falls off the corpse before searching the wiki.\n\n## tier-list\n\nElite | Savage | Toxic | Berserk | Necrotic | Grenadier | Prime | Nuclear | Vampiric | Wardens | Hellfire | DarkGod | Corrupted Darkgods | Spectral Wardens\n\n\n## arkshop\n\nArkShop runs in-game \u2014 earn points while you play, spend them on potions and consumables.\n\n### Earning Points\n\n| Group | Rate |\n|-------|------|\n| Default | 15 points every 5 minutes |\n| Premium | 45 points every 5 minutes |\n\nPremium players earn 3\u00d7 the default rate. Points only accrue while logged in.\n\n### Shop Catalog\n\n| Item | Cost | Effect |\n|------|------|--------|\n| Sanguine Elixir | 100 | 30% taming affinity boost |\n| Purified Sanguine Elixir | 300 | 60% taming affinity boost |\n| Harvest Potion | 100 | Increased resource yield |\n| Reset Mating Potion | 60 | Full mating cooldown reset |\n| Gender Change Potion | 60 | Swap dino gender |\n| Imprint Potion | 200 | 100% imprint affinity |\n| Imprint Owner Potion | 150 | Transfer imprint ownership |\n| GrowUp Potion | 350 | Instant maturation |\n| Lio Potion | 300 | Improves loot drop quality (Liopleurodon buff) |\n| Lio Potion \u00d73 | 500 | 3\u00d7 stronger Liopleurodon buff |\n\n## elite\n\nYour true entry point. Elite creatures have minor stat boosts above vanilla, making them helpful early-game tames while you prepare to take on Savage tier.\n\n## savage\n\nYour first tiered progression. Hunt Savage creatures for Savage Blood, craft Savage Tranqs, and tame your first Savage dinos. Set up breeding pairs to produce Savage Eggs for Toxic Kibble.\n\nSavage dinos also drop **Alpha Blood** and **Alpha Hide**.\n\n## savage-boss\n\nThe **Savage Achatina** is your first boss gate. Defeat it and a tameable snail remains.\n\n### Savage Snail\n\nThe tameable Savage Boss produces **Savage Slime Balls**, required for all kibble from Toxic tier onward.\n\n- Feed berries to produce slime balls\n- Can be evolved into a smaller version for easier base storage\n- If slime production stops, pod and re-deploy the snail\n\nThe Savage Boss drop points players toward **Kiryali Island** \u2014 that's where the Alpha Boss is summoned.\n\n## alpha-boss\n\nThe Alpha Boss no longer roams. Find **Kiryali Island** in the middle of Astraeos \u2014 populated only by ovis and equus. A ring of pillars topped with ovis-head statues guards the center; **one statue has a wall mount peeking through**. Strike the wall mount to summon the Alpha Boss.\n\n### Two phases\n\n- **Phase 1** \u2014 defeat the live Alpha Boss (Alpha Jerboa).\n- **Phase 2** \u2014 its skeleton (Bone Jerboa) rises after; finish that too.\n\n### Rewards\n\n- **Alpha Kibble** unlocks (kill-gated)\n- **Apex Kibble** unlocks (auto from mod when Alpha falls)\n- Contributes to the **Toxic Kibble** gate (alongside Savage Achatina)\n\nThe Alpha Boss drop points forward at **Minotarchos** in the Pyranthos labyrinth \u2014 Berserk Kibble waits there.\n\n## toxic\n\nWith Toxic Kibble ready, repeat the loop. Harvest Toxic Blood, craft Toxic Tranqs, tame Toxic creatures, and breed them for Berserk Kibble.\n\nToxic creatures have an AOE ability that inflicts torpor \u2014 a powerful alternative to tranqs for knocking out targets.\n\n> During this progression, start growing crops \u2014 you'll need them for Berserk Kibble.\n\n## minotarchos\n\n**Minotarchos** is a larger Minotaur in golden chains, summoned at an altar in the labyrinth on **Pyranthos**. Killing him unlocks **Berserk Kibble**.\n\n### Summoning\n\nMinotarchos doesn't roam — present the tribute at the altar to spawn him. Tribute (per Astraeos vanilla):\n\n- 2× Corrupt Heart\n- 25× Corrupted Nodule\n- 5× Lightning Talon\n- 25× Megalodon Tooth\n- 10× Thylacoleo Hook-Claw\n\n## berserk\n\nSame pattern, higher stakes. Berserk creatures hit harder and take more to bring down, but the rewards scale accordingly.\n\nBerserk dinos also drop **Apex Blood** and **Apex Hide**.\n\n## berserk-kings\n\nThree Berserk King bosstiers guard the Snail evolution:\n\n- **King of the Swamps** \u2014 swamp biomes\n- **King of the Grasslands** \u2014 grassland / plains\n- **King of the Desert** \u2014 desert / deathworm variant\n\nCollect a soul from ALL THREE kings to evolve your Savage Snail into a **Berserk Snail**, which produces Berserk Slime Balls for all kibble from Necrotic tier onward.\n\n> Tame a second Savage Snail before evolving. Kibbles from Necrotic tier onward require BOTH Savage and Berserk slime balls.\n\n## apex-boss\n\nThe Apex Boss is a Cyclops, summoned at an altar in the **Artifact of the Pack** chamber on **Therokis** \u2014 the altar sits on a ledge off to the right of the artifact.\n\nKilling the Cyclops alone doesn't unlock Necrotic Kibble \u2014 Thodes the Widowmaker must also fall.\n\n> Apex Kibble unlocked back at Alpha Boss; this gate now feeds Necrotic.\n\n## thodes\n\n**Thodes the Widowmaker** is the hard-mode Cyclops, summoned at an obelisk. Both the Apex Boss AND Thodes must fall to unlock **Necrotic Kibble**.\n\n## necrotic\n\nStarting at Necrotic tier, Queen Bees can produce honey directly in their inventory.\n\n### Honey Production\n\nWild bees are hostile and attack on sight. To set up honey production:\n\n1. **Kill Necrotic Bees** to collect a small amount of honey\n2. **Craft Necrotic Kibble** from that honey at the Supreme Bench\n3. **Tame a Necrotic Queen Bee** with the kibble for sustained honey production\n\nOnce tamed, place the tier's rare flowers (crafted at the Supreme Bench) in the bee's inventory \u2014 the bee produces honey automatically.\n\nQueen Bees are available across Necrotic, Prime, Nuclear, Vampiric, Hellfire, and DarkGod tiers \u2014 each tier's bee uses that tier's rare flowers.\n\n## elemental-guardians\n\nKill all three Elemental Guardians to unlock the **Necrotic Boss Summon** at the bench:\n\n- **Hydro Guardian** \u2014 dies in Lemnokis\n- **Volcanic Guardian** \u2014 dies in Therokis\n- **Electric Guardian** \u2014 dies in Pyranthos\n\n![Guardian tri-wheel \u2014 the three Elemental Guardians counter each other in a cycle](images/ELEMENTAL%20WHEEL%20CHAOS.png)\n\nEach Guardian takes only **Elemental Kibble** \u2014 evolve a Ramshackle lootboss up to Mastercraft tier; Elemental Kibble drops there.\n\n## necrotic-boss\n\nThe Necrotic Boss is a **Golem BOSS** \u2014 bench-summoned after the 3 Elemental Guardians fall.\n\nAfter defeating the Necrotic Boss, a **tameable Necrotic Golem** spawns on the spot. Knock it out and tame with Necrotic Kibble.\n\n## natrix\n\n**Natrix the Devious** is the Astraeos Alpha Gorgon — a Medusa-style Guardian Boss with snake hair. Both the Necrotic Golem AND Natrix must fall to unlock **Grenadier Kibble**.\n\n### Summoning\n\nSummon Natrix at an **Obelisk** — the **Alpha** variant is required for the gate. Tribute (per Astraeos vanilla):\n\n- 1× Artifact of the Clever\n- 1× Artifact of the Hunter\n- 1× Artifact of the Massive\n- 10× Argentavis Talon\n- 10× Sarcosuchus Skin\n- 10× Sauropod Vertebra\n- 10× Titanoboa Venom\n\nPlayer level 70+ required.\n\n## grenadier\n\nGrenadier tier introduces explosive combat mechanics.\n\n### Taming Grenadier Creatures\n\nGrenadier-tier creatures aren't tamed in the wild:\n\n1. **Find and kill a wild Grenadier Boss** — its death spawns a tameable variant on the spot.\n2. **KO the tameable variant** and feed it **Grenadier Kibble**.\n\n### Grenadier Tokens & Factory\n\nWild **Grenadier Bosses** drop a **Grenadier Token** and a **Grenadier Factory**. To produce **Grenadier Herb** (the key ingredient for Prime Kibble), the factory needs both the Grenadier Token *and* a **Chief Grenadier Token** dropped by the Grenadier Boss Tribesman.\n\n### Grenadier Boss Drops\n\nDefeating Grenadier bosses rewards:\n- High XP potions\n- Grenadier Health potions\n- High quality weapons\n- Ammo materials\n- Random assortment of ammo\n- Random Grenadier-tier and below tranqs\n\n### Grenadier Boss Tribesman\n\nA hostile tribe that can **only be fought with Grenadier-tier or higher tamed dinos**. The chief drops the Chief Grenadier Token required for Grenadier Herb production.\n\n### The 11-kill Prime Kibble gate\n\nPrime Kibble unlocks after defeating **all six Boss Titan Colossi AND all five Grenadier Bosses**:\n\n- **6 Boss Titan Colossi** (Earth / Storm / Frost / Hydro / Volcanic / Nature) \u2014 see the Elemental Titans section for taming and combat details.\n- **5 Grenadiers** (Bigfoot / Dodo / Doedicurus / Monkey / Spino).\n\nKilling all 11 unlocks **Prime Kibble** and drops Prime Saddles.\n\n## elemental-titans\n\nThe 6 **Boss Titan Colossi** (Earth / Storm / Frost / Hydro / Volcanic / Nature) gate Prime Kibble alongside the 5 Grenadier Bosses. Each Titan has a strong elemental matchup and a weak one \u2014 bring the matching counter-element.\n\n![Elemental wheel \u2014 each element advantages the next, every Titan has a strong matchup and a weak one](images/elemental_wheel_nemesis.png)\n\n### Taming a Titan\n\n1. **Defeat the matching Elemental Colossus** \u2014 unlocks the Elemental Incubator engram (crafted in the Primal Incubator) and drops the **Boss Skull** required for the Whelpling recipe.\n2. **Hunt a Wild Elemental Youngling** \u2014 drops an **Elemental Heart** automatically on kill. Younglings can't be crafted or summoned.\n3. **Place the Incubator** strategically \u2014 keep one at base for recipes (do NOT hatch from it), and one in an open area for the actual hatch.\n4. **Craft the Whelpling** \u2014 spawns immediately as a wild creature. KO it and feed matching Elemental Kibble.\n\n> WARNING: Younglings hit HARDER than Elemental Bosses. Come fully geared with your best tames. Do NOT summon a Whelpling inside your base \u2014 it will destroy structures.\n\n### Evolution stages\n\n- **Whelpling** \u2014 baby / juvenile.\n- **Youngling** \u2014 use evolution item in inventory; similar strength to wild variant.\n- **Adult Titan** \u2014 gains ALL special attacks from the boss variant; ideal for Elemental boss fights.\n\n## prime\n\nPrime tier features tameable Guardian bosses that are now **bench-summoned only**.\n\n### Taming Prime Creatures\n\nTo tame Prime tier creatures, you need Prime Kibble made from Grenadier Herb:\n\n1. **Collect Grenadier Herb** \u2014 Produced by the Grenadier Factory (see Grenadier section)\n2. **Craft kibble** \u2014 Use Grenadier Herb at the Supreme Bench to craft **Prime Kibble**\n3. **Tame** \u2014 Knock out Prime creatures with appropriate tranqs and feed Prime Kibble\n\n> Prime-tier bosses take reduced damage from anything that isn't a tek-type dino \u2014 bring Primes (or higher tek tiers) to fight Primes.\n\n## daeodons\n\nTwo Daeodon minibosses, summoned together at a **miniboss terminal** on **Lemnokis** \u2014 a small altar with a purple sphere. Both must die to unlock the **Prime Guardian summon scrolls** at the bench (Ferox, Spider, and Spino Guardians).\n\n- **Erymanthian** (Fire Daeodon) \u2014 fire-coated with burning tusks.\n- **Kalydonios** (Poison Daeodon) \u2014 mushroom-covered, emits poison gas (gas mask recommended).\n\n### Summoning\n\nTribute (per Astraeos vanilla):\n\n- 2\u00d7 Corrupted Art\n- 5\u00d7 Fire Talon\n- 5\u00d7 Poison Talon\n- 10\u00d7 Therizino Claw\n- 25\u00d7 Corrupted Nodule\n\n## prime-guardians\n\nBench-summon and defeat each. Each Guardian's drop points at one piece of the Bionic Chain:\n\n- **Bionic Ferox** \u2014 note hints at the Scion of Darkness\n- **Prime Spider** \u2014 note hints at the SwordMaster\n- **Prime Spino (GuardianSpino)** \u2014 note hints at the Terminator Giga\n\n## bionic-chain\n\nAfter the Prime Guardians, hunt the Bionic-tier wild bosses:\n\n- **Terminator Giga** + **SwordMaster** \u2014 each drops a note pointing at the other, then at the Scion of Darkness roaming in the wild\n- **Scion of Darkness** (roams) \u2014 killing it unlocks the **Bionic Boss Summon** at the bench. Resists elementals and necrotic; Prime tier required.\n- **Bionic Boss (Bionic Golem)** \u2014 bench-summoned. Killing it unlocks **Vampiric + Nuclear Kibble**.\n\n## nuclear-vampiric\n\nNuclear and Vampiric creatures have a unique taming mechanic \u2014 they **cannot be tranqed with darts or arrows**. They require tier-matched **Rocket Launchers** firing tranq rockets.\n\n### Taming Flow\n\n1. **Get the blueprints** \u2014 Nuclear and Vampiric Tribesmen drop the blueprints for their tier's Rocket Launcher and Tranq Rocket ammo\n2. **Knock out** \u2014 Tranq the target with the tier-matched Rocket Launcher loaded with Tranq Rockets\n3. **Feed kibble** \u2014 Nuclear Kibble on Nuclear creatures, Vampiric Kibble on Vampiric\n\nRockets are **1:1 tier-locked** \u2014 Nuclear Rockets only tranq Nuclear creatures, Vampiric Rockets only tranq Vampiric creatures. No cross-tranqing.\n\n| Tier | Tranq Weapon | Ammo | Kibble |\n|------|--------------|------|--------|\n| Nuclear | Nuclear Rocket Launcher | Nuclear Rocket | Nuclear Kibble |\n| Vampiric | Vampiric Rocket Launcher | Vampiric Rocket | Vampiric Kibble |\n\n## hydraskos\n\n**Hydraskos the Unbroken** is the Astraeos endgame boss. Killing him opens the path toward the Warden Kibble gate (Skorvax & Zaphyros).\n\n## skorvax-zaphyros\n\nBoth roam the wild \u2014 hunt them down. Killing both unlocks **Warden Kibble**:\n\n- **Skorvax** (Demonic_Scorpion_Character_BP)\n- **Zaphyros** (Angelic_Shapeshifter_Large_Character_BP)\n\n## wardens\n\nOnly the boss version of Warden creatures spawns in the wild. Killing a wild Warden boss spawns a tameable version on the spot \u2014 knock it out and tame it with the appropriate kibble.\n\nThis applies to: Warden Rex, Warden Wyvern, Warden Trike, Warden Gorilla, and Warden Manticore.\n\nWardens are evolved into Spectral Wardens \u2014 see the Spectral Wardens section for evolution requirements.\n\n## origins\n\n11 Origin Species (Argent / Carno / Direbear / Dodoreaper / Kairuku / Raptor / Rex / Spino / Trike / Wyvern / Yutyrannus). Hellfire-tier difficulty \u2014 bring high-tier gear. **All Origin tokens are required to craft the Draconis summon scroll.**\n\n## draconis\n\nBench-craft and consume the Draconis summon scroll. Killing Draconis unlocks the **DarkGod King summon scroll** at the bench.\n\n## supreme-warden-titan\n\nThe **Supreme Warden Titan** is bench-crafted with **Warden Tokens**. Defeating it unlocks **Hellfire Kibble**.\n\n## hellfire\n\nHellfire creatures use portal-based attacks.\n\n**Hellfire Kibble is freely craftable** \u2014 no kill-gate.\n\n## twin-titans\n\nThe Hellfire Boss is bench-craft only. To unlock the summon, kill both:\n\n- **Spirit Titan** (Spirit_Titan_Character_BP_BOSS)\n- **Chaos Titan** (Chaos_Titan_Character_BP_BOSS)\n\n## hellfire-boss\n\nThe **Hellfire Boss** is bench-summoned after both Twin Titans fall.\n\nAfter the Hellfire Boss falls, gather the **11 Origins** \u2014 recipe materials for the Draconis summon scroll. Tame Hellfire-tier creatures first; Origins hit at Hellfire-tier difficulty.\n\n## darkgod\n\n**DarkGod Kibble is freely craftable** \u2014 no kill-gate.\n\n### DarkGod Lineup\n\nAvailable DarkGod variants: Rex, Spider (Broodmother), Crab, Golem, **Griffin**, and **Reaper**.\n\n### DarkGod Drops\n\nDefeating wild DarkGods rewards:\n- Large XP potions\n- Random assortment of Health potions\n- Random assortment of Tranqs\n- Random assortment of DarkGod-tier Saddles\n\n## twin-guardians\n\nAfter gathering the Origin tokens, hunt the Twin Guardians to unlock the **Draconis summon scroll** at the bench:\n\n- **Hydra Lord** (Celestial_Hydra_Character_BP)\n- **Lucifer** (DemonicBoss_Character_BP)\n\n## darkgod-king\n\nThe **DarkGod King** is a bench-summoned boss \u2014 craft and consume the scroll to spawn him. Defeating the DarkGod King drops the evolution token used to advance creatures into DarkGods.\n\n## corrupted-darkgods\n\nCorrupted DarkGods are the best creatures to use against Spectral Wardens.\n\n### Obtaining Corrupted DarkGods\n\nCorrupted DarkGods (Rex, Spider/Broodmother, Crab, Golem, Griffin, Reaper) are obtained **only by evolving their DarkGod counterparts** \u2014 they do not spawn in the wild and cannot be tamed directly.\n\n## nightmares\n\n11 Nightmare Species (Argent / Carno / Direbear / Dodoreaper / Kairuku / Raptor / Rex / Spino / Trike / Wyvern / Yutyrannus). Corrupted-tier difficulty \u2014 Corrupted DarkGod-tier weapons required to engage cleanly. **All Nightmare tokens are required to craft the Death Knight summon scroll.**\n\n## death-knight\n\nBench-summon Death Knight. Killing it unlocks the **Corrupted Darkgod Emperor summon scroll** at the bench.\n\n## corrupted-emperor\n\nBench-summon **Corrupted Darkgod Emperor**. Defeating it drops the token used to evolve Wardens into Spectral Wardens.\n\n## spectral-wardens\n\nSpectral Wardens are the final evolution of Wardens.\n\n### Evolution Requirement\n\nEvolving a Warden into a Spectral Warden requires a **Corrupted DarkGod King token**, dropped by the Corrupted Darkgod Emperor (see Corrupted DarkGods).\n\n### Spectral Warden Drops\n\nDefeating wild Spectral Wardens rewards:\n- Large XP potions\n- Random assortment of Health potions\n- Random assortment of Tranqs\n- Random assortment of Spectral Warden Saddles\n\n## godly-bosses\n\n6 Godly Bosses (Broodmother / Crab / RockDrake / Sheep / SaberKing / Trike).\n\nEach Godly boss kill grants 1-3 random Tek engrams \u2014 **the only way to unlock Tek on this server**.\n\n## nemesis\n\n**Nemesis** is bench-crafted from Godly drops. It no longer roams \u2014 craft-only. Spectral tier \u2014 only Spectral-tier weapons deal full damage; everything else bounces off.\n\nKilling Nemesis unlocks the **Juggernaut summon** at the bench AND the **Juggernaut Kibble** recipe.\n\n## juggernaut\n\nThe Juggernaut is the **final boss** of progression \u2014 fought after Spectral Wardens.\n\n### Boss Fight\n\nThe Juggernaut now matches Spectral Wardens in strength and is a significant challenge. Defeating it drops a **Tameable Juggernaut Saddle**.\n\n### Tameable Juggernaut\n\nAfter the Juggernaut boss is defeated, a **Tameable Juggernaut** spawns. Tame it with **Juggernaut Kibble**.\n\n## faq\n\n### Boss Combat\n\nAll ground-based bosses will dismount flyers (10 second cooldown) \u2014 bring a ground mount for boss fights. Flyer-type bosses (Wyverns, Manticores) are the exception and do not dismount you.\n\n### Set Bonuses\n\nWearing **2 or more matching pieces** of a tier's armor activates that tier's set bonus \u2014 player buffs plus mount regen passives.\n\n**Scaling rules:**\n\n- **2 pieces** \u2014 40% of the listed bonus\n- **3-4 pieces** \u2014 70% of the listed bonus\n- **5 pieces** (Helmet + Chest + Gauntlets + Leggings + Boots) \u2014 100%\n- **Quality** \u2014 Common \u2192 Ascendant scales the bonus 1.0\u00d7 \u2192 1.5\u00d7 on top of the piece-count tier\n\n**Player buffs at full 5-piece (Common quality):**\n\n| Set | Health | Weight | Stamina | Dmg Resist | Other |\n|-----|--------|--------|---------|------------|-------|\n| Savage / Alpha | +150 | +400 | +50 | 15% | regen 0.5%/s |\n| Toxic | +100 | +600 | +75 | 5% | torpor resist 3% |\n| Berserk / Apex | +75 | +300 | +125 | \u2014 | stamina focus |\n| Necrotic | +75 | +350 | +100 | \u2014 | mid-tier filler |\n| Earth | +225 | +600 | +75 | 22% | tankiest elemental |\n| Volcanic / Storm / Hydro | +112 | +450-525 | +150-187 | \u2014 | mobility elementals |\n| Nature / Frost | +150 | +900 | +112 | 7% | utility, regen 1.5%/s |\n| Prime | +337 | +900 | +112 | 33% | first big DR jump |\n| Bionic | +168 | +675 | +281 | \u2014 | stamina-heavy |\n| Mythic | +100 | +1500 | +250 | \u2014 | weight king |\n| Demonic | +450 | +1200 | +150 | 45% | tank-of-choice |\n| Celestial | +300 | +1800 | +225 | 15% | regen 3%/s, torpor resist 9% |\n| Legendary | +300 | +900 | +400 | \u2014 | torpor resist 6% |\n| Hellfire | +500 | +1800 | +800 | \u2014 | huge stam pool |\n| Death Knight | +600 | +1500 | +400 | 50% | torpor resist 10% |\n| Godly | +4000 | +7500 | +2000 | 75% | torpor resist 75%, regen 20%/s |\n\n> Mount buffs scale with set tier \u2014 at Godly, your mount also gets +30%/s health regen and +25%/s stamina regen while you're wearing the full set.\n\n### Tribesman & Thralls (ArkSupreme)\n\nHostile NPCs that spawn in the wild and drop tier-appropriate loot when killed.\n\n**Tribesman tiers** (Minion and Chief variants where applicable):\n- Savage, Toxic, Berserk, Necrotic, Grenadier, Prime\n\n**Boss Tribesman**:\n- **Grenadier Boss Tribesman** \u2014 drops the **Chief Grenadier Token** required by the Grenadier Factory to produce Grenadier Herb. Can only be fought with Grenadier-tier or higher tamed dinos.\n\n**Thralls** (higher tiers):\n- Prime Thrall with Shotgun\n- Nuclear Thrall with Rocket Launcher\n- Hellfire Thrall with Flamethrower\n\n**General Drops** \u2014 each Tribesman drops a tier-appropriate mix of:\n- XP potions (size scales with tier \u2014 Tiny \u2192 Medium \u2192 High \u2192 Extra Large)\n- Health potions (random assortment, tier-specific)\n- Tranqs of their tier and below\n- Saddles, Armour, and Tools at their tier\n- High-quality weapons from Berserk tier upward (fabricated snipers, longnecks, etc.)\n- Ammo and ammo materials (Grenadier Boss Tribesman)\n- Taming Cakes (x50, x100, x250) \u2014 instantly remove food during taming\n\n**Notable extras**:\n- Necrotic Tribesman also drop tameable Necrotic boss saddles\n- Prime Tribesman are extremely dangerous \u2014 come prepared\n- **Nuclear Tribesman** drop the Nuclear Rocket Launcher + Nuclear Rocket blueprints (required for tranqing Nuclear creatures)\n- **Vampiric Tribesman** drop the Vampiric Rocket Launcher + Vampiric Rocket blueprints (required for tranqing Vampiric creatures)\n\n### Primal Nemesis Lootbosses\n\nRare wild encounters that project a **red beam into the sky** \u2014 when attacked, the beam disappears to signal engagement. Drops go directly to your inventory, not on the ground.\n\n**Drop types:**\n\n- **Saddles** \u2014 Crafted saddles from Primal Nemesis are always Primitive; lootbosses are the primary source of higher-quality saddles with randomized stat rolls. Can drop finished saddles or blueprints.\n- **Tame Helpers** \u2014 Basic Tame Helper craftable; stronger versions are exclusive lootboss drops. Alpha and Nature potions craftable; **Plasma, Celestial, and Godly potions are exclusive drops**.\n- **Quest scrolls** \u2014 Common Resource Quests trigger from creature kills; **High-Level Quests drop from Imposter Lootbosses** (Alpha, Apex, Elemental, Bionic). Consume the scroll from a dino's inventory; quest UI only shows while riding that dino.\n- **Stat-roll items** \u2014 Saddles, Weapons, Tools, Armor, Rings, Dino Totems all roll randomized bonus stats (MMO-style).\n\n**Stat slots scale by tier:**\nAlpha (2 slots, low values) \u2192 Apex (3 slots, medium) \u2192 Elemental \u2192 Plasma/Ghost/Plague \u2192 Bionic \u2192 Demonic/Celestial \u2192 **Godly** (most slots, highest values).\n\n**Loot quality:** Common \u2192 Uncommon \u2192 Rare \u2192 Epic \u2192 Legendary \u2192 Divine \u2192 Ancient. **Ancient is only obtainable from high-level quests.**\n\n### Primal Chaos Lootbosses\n\nSpawn naturally in the wild. Kill Mesopithecus and Procoptodon to encourage spawns. **Max 6 lootbosses exist on the map at once.**\n\n**Evolution mechanic** \u2014 Kill a lootboss to guarantee its evolution. The upgraded version spawns near the dead body and stays passive unless you stand right next to it. Drops scale upward \u2014 each higher tier inherits the saddle drop pool of every tier below it.\n\n**Tier ladder:**\n\n- **Ramshackle** \u2014 natural wild spawn (entry tier)\n- **Apprentice** \u2014 evolved from Ramshackle\n- **Journeyman** \u2014 evolved from Apprentice\n- **Mastercraft** \u2014 evolved from Journeyman; drops **Elemental Kibble** + Guardian Saddles\n- **Ascendant** \u2014 drops Demonic and Angelic Saddles\n- **Origin** \u2014 goes berserk randomly during combat; drops quality Origin Saddles\n- **Nightmare** \u2014 goes berserk randomly during combat; drops quality Nightmare Saddles\n\n> Only Primal Chaos Lootbosses drop saddles in PC's loot economy \u2014 other PC drops come from boss fights, tribesman tiers, or the Chaos Smithy.\n";
    const sections=parseMarkdown(md);
    const contentEl=document.getElementById('content');
    const hero=document.createElement('div');hero.id='hero';
    hero.innerHTML='<h1>NEMESIS SUPREME</h1>';
    const baseline=sections.find(s=>s.id==='baseline');
    if(baseline){const box=document.createElement('div');box.className='baseline-box';box.innerHTML=marked.parse(baseline.lines.join('\n'));hero.appendChild(box);}
    contentEl.appendChild(hero);
    sections.filter(s=>s.id!=='baseline').forEach(section=>{
      if(section.id==='tier-list'){

        const tt=document.createElement('div');tt.className='section-title';tt.textContent='Tier List';
        td.appendChild(tt);
        td.appendChild(renderTierDiagram());
        contentEl.appendChild(td);return;
      }
      contentEl.appendChild(renderSection(section));
    });
    const footer=document.createElement('div');footer.className='guide-footer';
    footer.innerHTML='Guide maintained by Rokitur — RokiArkNet<br>Questions or corrections? Contact @Rokitur on Discord';
    contentEl.appendChild(footer);
    document.getElementById('loading').style.display='none';
    contentEl.style.display='block';
    buildNav();
    const navLinks=document.querySelectorAll('#nav a');
    window.addEventListener('scroll',()=>{
      let current='';
      document.querySelectorAll('.section[id]').forEach(s=>{if(window.scrollY>=s.offsetTop-100)current=s.id;});
      navLinks.forEach(a=>{a.classList.toggle('active',a.getAttribute('href')==='#'+current);});
    });
  }catch(e){document.getElementById('loading').textContent='Failed to load guide. '+e.message;}
}
loadGuide();
</script>
</body>
</html>
